<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משדר זרנוק</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260420b" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">ניהול מערכות</p>
        <h1>משדר זרנוק</h1>
        <p class="hero-copy">לוח בקרה לניטור ושליטה במערכות מחוברות, עם מסך פירוט ייעודי לכל התקן.</p>
      </div>
      <div class="hero-panel">
        <span class="label">מצב חיבור</span>
        <strong id="connection-state">מתחבר...</strong>
      </div>
    </header>

    <main id="app"></main>
  </div>

  <template id="overview-template">
    <section class="toolbar">
      <div>
        <h2>מסך הבית</h2>
        <p>חיפוש לפי מספר סידורי, הוספת התקן חדש או מעבר למסך הפירוט.</p>
      </div>
      <div class="toolbar-actions">
        <label class="search">
          <span>חיפוש לפי SN או שם</span>
          <input id="device-search" type="search" placeholder="6673842E / ארון ראשי" />
        </label>
        <form id="add-device-form" class="add-device-form">
          <label>
            הוספת התקן
            <input id="add-device-input" type="text" maxlength="8" placeholder="SN בן 8 תווים" />
          </label>
          <label>
            שם מזהה
            <input id="add-device-name-input" type="text" maxlength="80" placeholder="למשל: ארון ראשי" />
          </label>
          <label>
            Topic פקודות
            <input id="add-command-topic-input" type="text" placeholder="basa/DEVICE/command" />
          </label>
          <label>
            Topic טלמטריה
            <input id="add-telemetry-topic-input" type="text" placeholder="basa/DEVICE/telemetry" />
          </label>
          <button class="action-button" type="submit">הוסף</button>
        </form>
      </div>
    </section>
    <div id="overview-feedback" class="command-feedback hidden" aria-live="polite"></div>
    <section id="device-grid" class="device-grid"></section>
  </template>

  <template id="dashboard-template">
    <section class="toolbar">
      <div>
        <button class="ghost-button" id="back-button">חזרה</button>
        <h2 id="device-title">התקן</h2>
        <p>ניטור ושליטה בערוץ 2.</p>
      </div>
      <div class="device-status-line">
        <span id="device-online-badge" class="status-badge">לא ידוע</span>
        <span id="last-command" class="mono"></span>
      </div>
    </section>

    <section class="dashboard-grid">
      <article class="panel gauges-panel">
        <div class="panel-head">
          <h3>ניטור</h3>
          <span class="subtle">טלמטריה בזמן אמת</span>
        </div>
        <div class="gauges">
          <div class="gauge">
            <div class="gauge-ring"><span id="ir-value">0.00</span></div>
            <p>זרם Ir (A)</p>
          </div>
          <div class="gauge">
            <div class="gauge-ring"><span id="v1-value">0.0</span></div>
            <p>מתח V1 (V)</p>
          </div>
          <div class="gauge">
            <div class="gauge-ring"><span id="frequency-value">0.0</span></div>
            <p>תדר (kHz)</p>
          </div>
          <div class="gauge">
            <div class="gauge-ring"><span id="resistance-value">0.0</span></div>
            <p>התנגדות (Ohm)</p>
          </div>
          <div class="gauge">
            <div class="gauge-ring"><span id="power-value">0.0</span></div>
            <p>הספק (W)</p>
          </div>
          <div class="gauge">
            <div class="gauge-ring"><span id="battery-gauge-value">0.0</span></div>
            <p>מתח סוללה (V)</p>
          </div>
        </div>
        <div class="topic-box">
          <div><strong>שם מזהה</strong><span id="device-name-value"></span></div>
          <div><strong>Topic טלמטריה</strong><span id="telemetry-topic-value" class="mono"></span></div>
          <div><strong>Topic פקודות</strong><span id="command-topic-value" class="mono"></span></div>
        </div>
      </article>

      <article class="panel control-panel">
        <div class="panel-head">
          <h3>שליטה</h3>
          <span class="subtle">פקודות מרחוק</span>
        </div>
        <div id="command-feedback" class="command-feedback hidden" aria-live="polite"></div>
        <div id="low-battery-warning" class="warning hidden">הגנת סוללה פעילה. לא ניתן להפעיל מרחוק כרגע.</div>
        <div class="toggle-row">
          <button id="output-on" class="action-button">הפעל</button>
          <button id="output-off" class="action-button secondary">כבה</button>
        </div>
        <form id="control-form" class="control-form">
          <label>
            זרם יעד (A)
            <input id="current-input" type="number" step="0.1" min="0" />
          </label>
          <label>
            תדר יעד (kHz)
            <input id="frequency-input" type="number" step="0.1" min="0" />
          </label>
          <button class="action-button wide" type="submit">שלח הגדרות</button>
        </form>
      </article>

      <article class="panel alerts-panel">
        <div class="panel-head">
          <h3>התראות</h3>
          <span class="subtle">הגנות וחריגות</span>
        </div>
        <form id="device-name-form" class="control-form">
          <label>
            שם מזהה
            <input id="device-name-input" type="text" maxlength="80" />
          </label>
          <button class="action-button wide" type="submit">שמור שם</button>
        </form>
        <div id="alerts-list" class="alerts-list"></div>
        <button id="delete-device-button" class="ghost-button danger-button" type="button">מחק התקן</button>
      </article>
    </section>
  </template>

  <script src="/static/app.js?v=20260420b" type="module"></script>
</body>
</html>
